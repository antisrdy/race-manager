services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - race_data:/data
    environment:
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env (see .env.example)}
      DATABASE: /data/race_manager.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  race_data:
